<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register Admin BPKB</title>
  <link rel="stylesheet" href="signin.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body class="register-body">

  <div class="register-container">
    <form class="register-form">
      <h2 class="register-title">Register Admin BPKB</h2>

      <input type="email" placeholder="Email" class="register-input" required />
      <input type="text" placeholder="username" class="register-input" required />
      <input type="password" placeholder="password" class="register-input" required />

      <button type="submit" class="register-button">Log In</button>

      <p class="register-footer">
        Have an Account? <a href="#" class="register-login-link">Login</a>
      </p>
    </form>
  </div>

</body>
</html>
