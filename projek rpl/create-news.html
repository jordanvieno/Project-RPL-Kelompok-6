<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create News</title>
  <link rel="stylesheet" href="create-news.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

  <!-- SIDEBAR -->
  <nav class="sidebar close">
    <header>
      <div class="imgtext">
        <span class="image1">
          <img class="apaya1" src="../asset/logo2.png" alt="logo1">
        </span>
        <span class="image2">
          <img class="apaya2" src="../asset/2.png" alt="logo2">
        </span>
      </div>
      <i class='bx bx-chevron-right toggle'></i>
    </header>

    <div class="menu-bar">
      <div class="menu">
        <ul class="menu-links">
          <li class="nav-link">
            <a href="#">
              <i class='bx bxs-dashboard icon'></i>
              <span class="text nav-text">Dashboard</span>
            </a>
          </li>
          <li class="nav-link">
            <a href="#">
              <i class='bx bx-camera icon'></i>
              <span class="text nav-text">Dokumentasi</span>
            </a>
          </li>
          <li class="nav-link">
            <a href="#">
              <i class='bx bx-news icon'></i>
              <span class="text nav-text">Berita</span>
            </a>
          </li>
          <li class="nav-link">
            <a href="#">
              <i class='bx bx-calendar-event icon'></i>
              <span class="text nav-text">Operasi</span>
            </a>
          </li>
        </ul>
      </div>

      <div class="bottom-content">
        <li>
          <a href="#">
            <i class='bx bx-user-circle icon'></i>
            <span class="text nav-text">Profil</span>
          </a>
        </li>
        <li>
          <a href="#">
            <i class='bx bx-log-out icon'></i>
            <span class="text nav-text">Logout</span>
          </a>
        </li>
      </div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
<section class="home">
  <div class="form-container">
    <h1>Create News</h1>

    <label for="upload">Foto</label>
    <input type="file" id="upload" accept="image/*" onchange="previewImage(event)" />

    <p>Preview</p>
    <div class="image-preview" id="imagePreview">
      <span class="icon">🖼️</span>
    </div>

    <label for="description">Keterangan Foto</label>
    <input type="text" id="description" placeholder="Title" />

    <label for="tanggal">Tanggal</label>
    <input type="date" id="tanggal" />

    <div class="button-group">
      <button class="outline-btn">Upload</button>
      <button class="primary-btn">Save Draft</button>
    </div>
  </div>
</section>


  <script>
    const sidebar = document.querySelector(".sidebar");
    const toggleBtn = document.querySelector(".toggle");
    toggleBtn.addEventListener("click", () => {
      sidebar.classList.toggle("close");
    });

    function previewImage(event) {
      const imagePreview = document.getElementById('imagePreview');
      const file = event.target.files[0];

      if (file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          imagePreview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
        };
        reader.readAsDataURL(file);
      }
    }
  </script>
</body>
</html>
