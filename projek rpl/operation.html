<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Operation Update</title>
  <link rel="stylesheet" href="operation.css" />
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="sidebar close">
    <header>
      <div class="imgtext">
        <span class="image1">
          <img class="apaya1" src="../Operation/logo-bpkb (1).png" alt="logo1">
        </span>
        <span class="image2">
          <img class="apaya2" src="../Operation/logo-bpkb (1).png" alt="logo2">
        </span>
      </div>
      <i class='bx bx-chevron-right toggle'></i>
    </header>

    <div class="menu-bar">
      <div class="menu">
        <ul class="menu-links">
          <li class="nav-link">
            <a href="#"><i class='bx bxs-dashboard icon'></i><span class="text nav-text">Dashboard</span></a>
          </li>
          <li class="nav-link">
            <a href="#"><i class='bx bx-camera icon'></i><span class="text nav-text">Dokumentasi</span></a>
          </li>
          <li class="nav-link">
            <a href="#"><i class='bx bx-news icon'></i><span class="text nav-text">Berita</span></a>
          </li>
          <li class="nav-link">
            <a href="#"><i class='bx bx-calendar-event icon'></i><span class="text nav-text">Operasi</span></a>
          </li>
        </ul>
      </div>

      <div class="bottom-content">
        <li>
          <a href="#"><i class='bx bx-user-circle icon'></i><span class="text nav-text">Profile</span></a>
        </li>
        <li class="nav-link">
          <a href="#"><i class='bx bx-log-out icon'></i><span class="text nav-text">Logout</span></a>
        </li>
      </div>
    </div>
  </nav>

  <section class="home">
    <div class="main">
      <h1>Operation</h1>
      <div class="grid">
        <!-- CARD TEMPLATE -->
        <div class="card">
          <h3>Transportation</h3>
          <p class="score" id="score-transportation">140/300</p>
            <input type="text" placeholder="New Data" id="input-transportation">
          <button onclick="updateScore('transportation')">Update Data</button>

        </div>

        <div class="card">
          <h3>Energy Conversation</h3>
          <p class="score" id="score-energy">140/300</p>
            <input type="text" placeholder="New Data" id="input-energy">
          <button onclick="updateScore('energy')">Update Data</button>

        </div>

        <div class="card">
          <h3>Water</h3>
          <p class="score" id="score-water">140/300</p>
          <input type="text" placeholder="New Data" id="input-water">
          <button onclick="updateScore('water')">Update Data</button>
        </div>

        <div class="card">
          <h3>Education and Research</h3>
          <p class="score" id="score-education">140/300</p>
          <input type="text" placeholder="New Data" id="input-education">
          <button onclick="updateScore('education')">Update Data</button>
        </div>

        <div class="card">
          <h3>Waste</h3>
          <p class="score" id="score-waste">140/300</p>
          <input type="text" placeholder="New Data" id="input-waste">
          <button onclick="updateScore('waste')">Update Data</button>
        </div>

        <div class="card">
          <h3>Setting and Infrastructure</h3>
          <p class="score" id="score-infra">140/300</p>
          <input type="text" placeholder="New Data" id="input-infra">
          <button onclick="updateScore('infra')">Update Data</button>
        </div>
      </div>
    </div>
  </section>

  <script>
  function updateScore(id) {
    const input = document.getElementById(`input-${id}`);
    const score = document.getElementById(`score-${id}`);
    const button = document.getElementById(`btn-${id}`);

    const value = input.value.trim();

    if (value !== '') {
      score.innerText = value;  // Langsung tampilkan sesuai input
      input.value = '';
      button.disabled = true;
    }
  }

  function toggleButton(inputElement, buttonId) {
    const button = document.getElementById(buttonId);
    button.disabled = inputElement.value.trim() === '';
  }

  
    const toggle = document.querySelector(".toggle");
    const sidebar = document.querySelector(".sidebar");
    const home = document.querySelector(".home");

    toggle.addEventListener("click", () => {
      sidebar.classList.toggle("close");
    });

    function updateScore(id) {
      const input = document.getElementById(`input-${id}`);
      const score = document.getElementById(`score-${id}`);
      if (input.value) {
        score.innerText = `${input.value}`;
        input.value = '';
      }
    }
  </script>
</body>
</html>
