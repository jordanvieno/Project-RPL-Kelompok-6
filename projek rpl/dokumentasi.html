<body>

                <span class="image2">
                    <img class="apaya2" src="foto/logo-bpkb (1).png" alt="logo2">

       </header>

       <div class="menu-bar">
        <div class="menu">
            <ul class="menu-links">
                <li class="nav-link">
                    <a href="#">
                        <i class='bx bxs-dashboard icon'></i>
                        <span class="text nav-text">Dashboard</span>
                    </a>
                </li>
                <li class="nav-link">
                    <a href="#">
                        <i class='bx bx-camera icon'></i>
                        <span class="text nav-text">Dokumentasi</span>
                    </a>
                </li>
                 <li class="nav-link">
                    <a href="#">
                        <i class='bx bx-news icon'></i>

                    <a href="#">
                        <i class='bx bx-calendar-event icon'></i>

        </div>

        <div class="bottom-content">
            <li class="">
                    <a href="#">
                        <i class='bx bx-user-circle icon'></i>

                    <a href="#">

        <p class="judul"><span class="label">Judul Dokumentasi:</span> Gedung Rektorat IPB</p>
    </div>
        <div class="actions">
        <span class="date"><i class='bx bx-calendar'></i> 12 Dec, 2021</span>
        <div class="action-btns">
            <button class="edit"><i class='bx bx-edit'></i></button>
            <button class="delete"><i class='bx bx-trash'></i></button>
        </div>
        </div>

    </div>

      <div class="card">
                <img class="apaya1" src="foto/ipb foto.png" alt="logo1">
    
    <div class="card-text">
        <p class="judul"><span class="label">Judul Dokumentasi:</span> Gedung Rektorat IPB</p>

      </div>

               <img class="apaya1" src="foto/ipb foto.png" alt="logo1">

        <button class="delete"><i class='bx bx-trash'></i></button>
    </div>
      </div>
      <!-- FAB Tambah -->
<button class="fab-add">
  <i class='bx bx-plus'></i>
</button>

    </div>



    <script>
  const sidebar = document.querySelector(".sidebar");
  const toggle = document.querySelector(".toggle");

  toggle.addEventListener("click", () => {
    sidebar.classList.toggle("close");
  });
</script>

</html>
