<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="css/sidebar.css" rel="stylesheet" />
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>
  <nav class="sidebar close">

        <span class="image1"><img class="apaya1" src="asset/logo2.png" alt="logo1" /></span>
        <span class="image2"><img class="apaya2" src="asset/2.png" alt="logo2" /></span>

    <div class="menu-bar">

        <ul class="menu-links">
          <li class="nav-link"><a href="#" data-page="dashboard"><i class='bx bxs-dashboard icon'></i><span class="text nav-text">Dashboard</span></a></li>

      <div class="bottom-content">
        <li class="nav-link"><a href="#" data-page="profile"><i class='bx bx-user-circle icon'></i><span class="text nav-text">Profil</span></a></li>
        <li><a href="#"><i class='bx bx-log-out icon'></i><span class="text nav-text">Logout</span></a></li>
