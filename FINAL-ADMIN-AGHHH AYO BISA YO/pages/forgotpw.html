<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    .register-body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #091B74, #0A2AB0);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .register-container {
      background: white;
      padding: 2rem;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      width: 90%;
      max-width: 400px;
    }

    .register-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .register-title {
      text-align: center;
      color: #0A2AB0;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }

    .register-subtitle {
      text-align: center;
      font-size: 0.95rem;
      color: #888;
      margin-top: -0.5rem;
      margin-bottom: 1.5rem;
    }

    .input-label {
      font-size: 0.9rem;
      color: #555;
      margin-left: 0.2rem;
    }

    .register-input {
      padding: 0.8rem 1rem;
      border: 1px solid #ccc;
      border-radius: 12px;
      font-size: 1rem;
      outline: none;
    }

    .register-button {
      padding: 0.8rem 1rem;
      border: none;
      border-radius: 12px;
      background-color: #0A2AB0;
      color: white;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 5px 0 #071d85;
      transition: 0.2s ease;
    }

    .register-button:hover {
      background-color: #0d35c9;
    }
  </style>
</head>
<body class="register-body">

  <div class="register-container">
    <form class="register-form">
      <h2 class="register-title">Forgot Password</h2>
      <p class="register-subtitle">Please enter your email to reset the password</p>

      <label for="email" class="input-label">Your Email</label>
      <input type="email" id="email" placeholder="Enter your email" class="register-input" required />

      <button type="submit" class="register-button">Reset Password</button>
    </form>
  </div>

</body>
</html>
