<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Daftar Berita</title>
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI&display=swap" rel="stylesheet">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      margin: 0;
      background-color: #e7f0ff;
    }

    .container {
      display: flex;
    }

    .main-content {
      flex: 1;
      padding: 30px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .actions {
      display: flex;
      gap: 10px;
    }

    .add-news {
      background-color: #3A36DB;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      cursor: pointer;
    }

    .news-table {
      margin-top: 30px;
      background-color: #ffffff;
      border-radius: 12px;
      padding: 20px;
    }

    .table-header,
    .news-row {
      display: grid;
      grid-template-columns: 3fr 2fr 1fr 1fr;
      align-items: center;
      padding: 16px 24px;
      gap: 16px;
      background-color: white;
      border-bottom: 1px solid #eee;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .news-row:last-child {
      border-bottom: none;
    }

    .status {
      display: inline-block;
      padding: 6px 18px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      white-space: nowrap;
    }

    .status.uploaded {
      background-color: #10b981;
      color: white;
    }

    .status.draft {
      background-color: #e5e7eb;
      color: #374151;
    }

    .edit-btn,
    .delete-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      color: white;
    }

    .edit-btn {
      background-color: #3A36DB;
    }

    .delete-btn {
      background-color: #B3261E;
    }
  </style>
</head>
<body>

  <div class="container">
    <main class="main-content">
      <header class="top-bar">
        <h1>Berita</h1>
        <div class="actions">
          <button class="add-news">Tambah Berita +</button>
        </div>
      </header>

      <section class="news-table">
        <div class="table-header">
          <span>Judul Berita</span>
          <span>Tanggal Publikasi</span>
          <span>Status</span>
          <span>Actions</span>
        </div>

        <div id="news-list">
          <!-- Komponen berita akan dimasukkan di sini -->
        </div>
      </section>
    </main>
  </div>

  <script>
    // Komponen berita dinamis
    function createNewsComponent(title, date, status = "draft") {
      const row = document.createElement("div");
      row.className = "news-row";

      row.innerHTML = `
        <span>${title}</span>
        <span>${date}</span>
        <span class="status ${status}">${status === "uploaded" ? "Terunggah" : "Draft"}</span>
        <span class="actions">
          <button class="edit-btn"><i class='bx bx-edit-alt'></i></button>
          <button class="delete-btn"><i class='bx bx-trash'></i></button>
        </span>
      `;

      return row;
    }

    // Dummy data untuk contoh
    const dummyNews = [
      { title: "Judul Berita 1", date: "12 Dec, 2021", status: "uploaded" },
      { title: "Judul Berita 2", date: "13 Dec, 2021", status: "draft" }
    ];

    const newsList = document.getElementById("news-list");
    dummyNews.forEach(news => {
      newsList.appendChild(createNewsComponent(news.title, news.date, news.status));
    });

    // Event tombol tambah berita
    document.querySelector(".add-news").addEventListener("click", () => {
      // Ganti dengan loadPage('create-news') jika kamu pakai SPA
      alert("Arahkan ke halaman create-news.html");
    });
  </script>

</body>
</html>
